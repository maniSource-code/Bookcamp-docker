<!DOCTYPE html>
<html>
<head>
  <title>Book Camp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>📚 Welcome to Book Camp 2026</h1>
    <p>
      Book Camp is a community where everyone reads a book and shares their thoughts,
      lessons, and insights with others. It's a place to grow knowledge, improve speaking
      skills, and connect with fellow readers.
    </p>

    <h2>Register for Book Camp</h2>

    <form id="registerForm">
      <input type="text" id="name" placeholder="Your Name" required />
      <input type="email" id="email" placeholder="Your Email" required />
      <input type="text" id="bookName" placeholder="Book Name" required />
      <input type="text" id="authorName" placeholder="Author Name" required />
      <button type="submit">Register</button>
    </form>

    <p id="message"></p>
  </div>

<script src="script.js"></script>
</body>
</html>
